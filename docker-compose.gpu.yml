# GPU override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.gpu
    environment:
      - EIA_API_KEY=${EIA_API_KEY:-}
      - PLANETARY_COMPUTER_KEY=${PLANETARY_COMPUTER_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_BASE_URL=${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-openai/gpt-oss-20b}
      - NVIDIA_MAX_TOKENS=${NVIDIA_MAX_TOKENS:-8192}
      - NVIDIA_TEMPERATURE=${NVIDIA_TEMPERATURE:-1.0}
      - NVIDIA_TOP_P=${NVIDIA_TOP_P:-0.95}
      - MCP_ENABLE_LLM=true
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen3-8B}
      - VLLM_GPU_MEMORY=${VLLM_GPU_MEMORY:-0.9}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
